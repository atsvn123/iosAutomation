name: Build Rootless Package

on:
  push:
    branches: [ master, main, ios16-rootless ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build iOS App
        run: |
          xcodebuild \
            -project zxtouch/zxtouch.xcodeproj \
            -target zxtouch \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath ./app-build \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64 arm64e" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER=com.zjx.zxtouch \
            | xcpretty || true

      - name: Sign App with ldid
        run: |
          APP=app-build/Build/Products/Release-iphoneos/zxtouch.app
          # Install ldid if not present
          brew install ldid 2>/dev/null || true
          ldid -Szxtouch/app-entitlements.plist "$APP/zxtouch"
          # Replace the pre-built app in layout with our newly built one
          rm -rf layout/Applications/zxtouch.app
          cp -r "$APP" layout/Applications/zxtouch.app

      - name: Setup Theos
        uses: beerpiss/theos-action@v1
        with:
          cache: true

      - name: Build .deb
        run: make package THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: ZXTouch-rootless-deb
          path: packages/*.deb
          if-no-files-found: error
