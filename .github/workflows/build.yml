name: Build ZXTouch Package

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build iOS App
        run: |
          set -o pipefail
          xcodebuild \
            -project zxtouch/zxtouch.xcodeproj \
            -target zxtouch \
            -sdk iphoneos \
            -configuration Release \
            SYMROOT="$(pwd)/app-build" \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64 arm64e" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            PRODUCT_BUNDLE_IDENTIFIER=com.zjx.zxtouch \
            2>&1 | tee xcode_build.log | grep -E "error:|warning:|BUILD (SUCCEEDED|FAILED)|Compiling|Linking" | tail -40
          echo "--- Built app location ---"
          find ./app-build -name "*.app" -type d 2>/dev/null || echo "No .app found"

      - name: Upload Xcode build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-build-log
          path: xcode_build.log

      - name: Sign App with ldid
        run: |
          APP=$(find ./app-build -name "zxtouch.app" -type d | head -1)
          echo "App found at: $APP"
          brew install ldid 2>/dev/null || true
          ldid -Szxtouch/app-entitlements.plist "$APP/zxtouch"
          rm -rf layout/Applications/zxtouch.app
          cp -r "$APP" layout/Applications/zxtouch.app
          echo "App installed to layout"

      # ── Setup Theos (roothide fork — 100% compat with rootless + adds roothide support) ──
      - name: Cache roothide Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos
          key: roothide-theos-${{ runner.os }}-v2

      - name: Install roothide Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: bash -c "$(curl -fsSL https://raw.githubusercontent.com/roothide/theos/master/bin/install-theos)"
        env:
          THEOS: ${{ github.workspace }}/theos

      # ── Rootless (Dopamine) build ──────────────────────────────────────────
      - name: Build Rootless .deb
        run: make package THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Save Rootless .deb
        run: |
          mkdir -p artifacts
          DEB=$(ls packages/*.deb | head -1)
          VERSION=$(grep '^Version:' pccontrol/control | awk '{print $2}')
          cp "$DEB" "artifacts/com.zjx.ioscontrol_${VERSION}_rootless.deb"
          echo "Saved: artifacts/com.zjx.ioscontrol_${VERSION}_rootless.deb"

      # ── Roothide build ─────────────────────────────────────────────────────
      - name: Clean for Roothide build
        run: make clean
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build Roothide .deb
        # DISABLE_ROOTLESS_COMPAT_WARNING=1 silences the warning about using ROOT_PATH macros
        # with the roothide scheme — they are fully compatible per roothide/theos docs
        run: make package THEOS_PACKAGE_SCHEME=roothide FINALPACKAGE=1 DISABLE_ROOTLESS_COMPAT_WARNING=1
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Save Roothide .deb
        run: |
          DEB=$(ls packages/*.deb | head -1)
          VERSION=$(grep '^Version:' pccontrol/control | awk '{print $2}')
          cp "$DEB" "artifacts/com.zjx.ioscontrol_${VERSION}_roothide.deb"
          echo "Saved: artifacts/com.zjx.ioscontrol_${VERSION}_roothide.deb"

      # ── Upload artifacts ───────────────────────────────────────────────────
      - name: Upload Rootless deb
        uses: actions/upload-artifact@v4
        with:
          name: ZXTouch-rootless-deb
          path: artifacts/*_rootless.deb
          if-no-files-found: error

      - name: Upload Roothide deb
        uses: actions/upload-artifact@v4
        with:
          name: ZXTouch-roothide-deb
          path: artifacts/*_roothide.deb
          if-no-files-found: error

      # ── Create GitHub Release (on tag push only) ───────────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*_rootless.deb
            artifacts/*_roothide.deb
          generate_release_notes: true
          body: |
            ## ZXTouch Rootless

            | File | Jailbreak | iOS |
            |------|-----------|-----|
            | `*_rootless.deb` | Dopamine | 15.0 – 16.6.1 |
            | `*_roothide.deb` | Roothide / Serotonin | 15.0 – 16.6.1 |

            ### Installation
            1. Download the `.deb` for your jailbreak
            2. Install via Filza or SSH: `dpkg -i <file>.deb && killall -9 SpringBoard`

            > Python scripts require `python3` from the Procursus repo.
