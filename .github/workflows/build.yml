name: Build Rootless Package

on:
  push:
    branches: [ master, main, ios16-rootless ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build iOS App
        run: |
          set -o pipefail
          xcodebuild \
            -project zxtouch/zxtouch.xcodeproj \
            -target zxtouch \
            -sdk iphoneos \
            -configuration Release \
            SYMROOT="$(pwd)/app-build" \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64 arm64e" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            PRODUCT_BUNDLE_IDENTIFIER=com.zjx.zxtouch \
            2>&1 | tee xcode_build.log | grep -E "error:|warning:|BUILD (SUCCEEDED|FAILED)|Compiling|Linking" | tail -40
          echo "--- Built app location ---"
          find ./app-build -name "*.app" -type d 2>/dev/null || echo "No .app found"

      - name: Upload Xcode build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-build-log
          path: xcode_build.log

      - name: Sign App with ldid
        run: |
          APP=$(find ./app-build -name "zxtouch.app" -type d | head -1)
          echo "App found at: $APP"
          brew install ldid 2>/dev/null || true
          ldid -Szxtouch/app-entitlements.plist "$APP/zxtouch"
          rm -rf layout/Applications/zxtouch.app
          cp -r "$APP" layout/Applications/zxtouch.app
          echo "App installed to layout"

      - name: Setup Theos
        uses: beerpiss/theos-action@v1
        with:
          cache: true

      - name: Build .deb
        run: make package THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: ZXTouch-rootless-deb
          path: packages/*.deb
          if-no-files-found: error
